<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rixo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050508; font-family: 'Plus Jakarta Sans', sans-serif; color: #e2e8f0; margin: 0; }
        
        /* Premium Micro-Dot Pattern to fill empty space naturally */
        .tech-bg {
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        .msg-user {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px; font-size: 0.9rem; max-width: 80%; align-self: flex-end;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.1);
            color: #000;
            font-weight: 600;
        }
        
        .msg-bot {
            background: #11141b; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 16px; font-size: 0.9rem; max-width: 85%; line-height: 1.5;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        .input-bar { background: #0d0f14; border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        .send-btn { background: #06b6d4; color: #000; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
        #messages::-webkit-scrollbar { width: 0; }
        
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Slide up animation for Long Press Menu */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-menu { animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="flex h-screen overflow-hidden justify-center bg-black">

    <main class="flex flex-col w-full max-w-md bg-[#050508] border-x border-white/5 relative tech-bg">
        
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5 bg-[#050508]/90 backdrop-blur-md z-10">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-cyan-500/10 flex items-center justify-center">
                    <i data-lucide="zap" class="w-4 h-4 text-cyan-500"></i>
                </div>
                <h1 class="font-bold text-base tracking-tight text-white">Rixo AI</h1>
            </div>
            <div class="text-[10px] font-mono text-gray-500 tracking-widest bg-white/[0.02] px-2 py-1 rounded border border-white/5">
                SECURE // LN-03
            </div>
        </header>

        <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4">
            
            <div class="flex flex-col gap-3 items-start w-full" id="welcomeStack">
                <div class="flex justify-start w-full">
                    <div class="msg-bot text-white" onmousedown="startPress(this)" onmouseup="endPress()" ontouchstart="startPress(this)" ontouchend="endPress()">
                        Hi! I am Rixo. How can I help you?
                    </div>
                </div>

                <div id="suggestions" class="flex gap-2 overflow-x-auto w-full pb-1 mt-1 scroll-hide">
                    <button onclick="useSuggestion('Tell me a funny joke')" class="flex items-center gap-1.5 bg-[#11141b] border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3.5 py-1.5 rounded-full whitespace-nowrap transition-all">
                        <i data-lucide="smile" class="w-3.5 h-3.5 text-cyan-500"></i>
                        <span>Tell a Joke</span>
                    </button>
                    <button onclick="useSuggestion('Give me a short coding tip')" class="flex items-center gap-1.5 bg-[#11141b] border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3.5 py-1.5 rounded-full whitespace-nowrap transition-all">
                        <i data-lucide="code-2" class="w-3.5 h-3.5 text-cyan-500"></i>
                        <span>Code Help</span>
                    </button>
                    <button onclick="useSuggestion('What is the most interesting thing about AI?')" class="flex items-center gap-1.5 bg-[#11141b] border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3.5 py-1.5 rounded-full whitespace-nowrap transition-all">
                        <i data-lucide="cpu" class="w-3.5 h-3.5 text-cyan-500"></i>
                        <span>AI Insights</span>
                    </button>
                </div>
            </div>

        </div>

        <div class="p-4 bg-[#050508]/95 backdrop-blur-md border-t border-white/[0.02]">
            
            <div class="flex justify-between items-center px-2 mb-2 text-[10px] font-bold text-gray-600 tracking-wider">
                <span>RIXO CORE ENGINE ACTIVE</span>
                <span id="charCount">0 / 500</span>
            </div>

            <div class="input-bar flex items-center px-2 py-1.5">
                <input id="userInput" type="text" maxlength="500"
                    class="flex-1 bg-transparent border-none outline-none text-white px-3 py-2 text-sm placeholder-gray-500" 
                    placeholder="Message Rixo...">
                <button onclick="sendMessage()" class="send-btn">
                    <i data-lucide="arrow-up" class="w-5 h-5 stroke-[3px]"></i>
                </button>
            </div>
        </div>

        <div id="actionMenu" class="hidden fixed inset-x-0 bottom-0 max-w-md mx-auto bg-[#0d1017] border-t border-white/10 rounded-t-2xl z-50 p-4 shadow-[0_-10px_40px_rgba(0,0,0,0.9)] animate-menu">
            <div class="w-12 h-1 bg-gray-700 rounded-full mx-auto mb-4"></div>
            <div class="flex flex-col gap-2">
                <button onclick="triggerCopy()" class="flex items-center justify-between w-full p-3 bg-white/[0.03] hover:bg-white/[0.08] text-sm font-semibold rounded-xl transition-all">
                    <span class="flex items-center gap-2 text-gray-200"><i data-lucide="copy" class="w-4 h-4 text-cyan-400"></i> Copy Response</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
                </button>
                <button onclick="triggerClear()" class="flex items-center justify-between w-full p-3 bg-red-500/5 hover:bg-red-500/10 text-sm font-semibold rounded-xl transition-all border border-red-500/10">
                    <span class="flex items-center gap-2 text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i> Clear Conversation</span>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
                </button>
                <button onclick="closeMenu()" class="w-full text-center py-2.5 mt-2 text-xs font-bold text-gray-500 hover:text-white tracking-wide uppercase">
                    Cancel
                </button>
            </div>
        </div>
        
        <div id="menuOverlay" class="hidden fixed inset-0 bg-black/60 z-40 max-w-md mx-auto" onclick="closeMenu()"></div>

    </main>

    <script>
        lucide.createIcons();

        const SERVER_URL = "/chat"; 
        let currentTargetMessage = null;
        let pressTimer = null;

        // Dynamic Text Counter Filler logic
        const inputField = document.getElementById("userInput");
        inputField.addEventListener("input", () => {
            document.getElementById("charCount").innerText = `${inputField.value.length} / 500`;
        });

        // Long Press Logic Implementation
        function startPress(element) {
            currentTargetMessage = element;
            pressTimer = setTimeout(() => {
                openMenu();
            }, 600); // 600ms hold triggers the contextual action sheet
        }

        function endPress() {
            clearTimeout(pressTimer);
        }

        function openMenu() {
            document.getElementById("actionMenu").classList.remove("hidden");
            document.getElementById("menuOverlay").classList.remove("hidden");
        }

        function closeMenu() {
            document.getElementById("actionMenu").classList.add("hidden");
            document.getElementById("menuOverlay").classList.add("hidden");
        }

        function triggerCopy() {
            if (currentTargetMessage) {
                navigator.clipboard.writeText(currentTargetMessage.innerText).then(() => {
                    closeMenu();
                });
            }
        }

        function triggerClear() {
            const messages = document.getElementById("messages");
            messages.innerHTML = `
                <div class="flex flex-col gap-3 items-start w-full" id="welcomeStack">
                    <div class="flex justify-start w-full">
                        <div class="msg-bot text-white" onmousedown="startPress(this)" onmouseup="endPress()" ontouchstart="startPress(this)" ontouchend="endPress()">
                            Chat cleared! How can I help you now?
                        </div>
                    </div>
                </div>
            `;
            document.getElementById("suggestions").style.display = "flex";
            closeMenu();
            lucide.createIcons();
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            // Hide initial layout suggestions on first interaction
            const suggestions = document.getElementById("suggestions");
            if (suggestions) suggestions.style.display = "none";

            addMessage(text, "user");
            input.value = "";
            document.getElementById("charCount").innerText = "0 / 500";

            const loaderId = "l-" + Date.now();
            const loader = document.createElement("div");
            loader.id = loaderId;
            loader.className = "flex justify-start animate-pulse";
            loader.innerHTML = `<div class="msg-bot text-gray-500 text-xs">Rixo is thinking...</div>`;
            document.getElementById("messages").appendChild(loader);

            try {
                const response = await fetch(SERVER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                document.getElementById(loaderId).remove();

                if (data.reply) {
                    addMessage(data.reply, "bot");
                } else {
                    addMessage("Server issue. Please try again.", "bot");
                }

            } catch (err) {
                document.getElementById(loaderId).innerHTML = `<div class="msg-bot text-red-400 text-xs">Error: Could not connect to Rixo server.</div>`;
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "flex " + (sender === "user" ? "justify-end" : "justify-start");
            
            if (sender === "bot") {
                div.innerHTML = `<div class="msg-bot text-white" onmousedown="startPress(this)" onmouseup="endPress()" ontouchstart="startPress(this)" ontouchend="endPress()">${text}</div>`;
            } else {
                div.innerHTML = `<div class="msg-user">${text}</div>`;
            }
            
            messages.appendChild(div);
            messages.scrollTo({ top: messages.scrollHeight, behavior: 'smooth' });
        }
        
        document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
