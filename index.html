<div class="app-wrapper max-w-md sm:border-x border-white/5 z-10">
        
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5 bg-[#050508]/80 backdrop-blur-md shrink-0 z-10">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-cyan-500/10 flex items-center justify-center">
                    <i data-lucide="zap" class="w-4 h-4 text-cyan-500"></i>
                </div>
                <h1 class="font-bold text-base tracking-tight text-white">Rixo AI</h1>
            </div>
            <button class="hover:bg-white/5 p-1 rounded-full transition-colors">
                <i data-lucide="sparkles" class="w-4 h-4 text-cyan-500"></i>
            </button>
        </header>

        <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4 z-10">
            <div class="flex justify-start msg-anim">
                <div class="msg-bot text-white">Hi! I am Rixo. How can I help you today?</div>
            </div>
        </div>

        <div class="p-4 bg-[#050508]/90 backdrop-blur-md border-t border-white/5 shrink-0 z-10">
            <div class="input-bar flex items-center px-2 py-1.5">
                <input id="userInput" type="text" 
                    class="flex-1 bg-transparent border-none outline-none text-white px-3 py-2 text-sm" 
                    placeholder="Ask Rixo anything..."
                    autocomplete="off">
                <button onclick="sendMessage()" class="send-btn">
                    <i data-lucide="arrow-up" class="w-5 h-5 stroke-[3px]"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const SERVER_URL = "/chat"; 

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            const loaderId = "l-" + Date.now();
            const loader = document.createElement("div");
            loader.id = loaderId;
            loader.className = "flex justify-start msg-anim";
            
            // Premium Animated Dots instead of plain text
            loader.innerHTML = '<div class="msg-bot flex items-center gap-1.5 py-3 px-4"><span class="text-xs text-gray-400 mr-1">Rixo</span><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            document.getElementById("messages").appendChild(loader);
            
            const messagesContainer = document.getElementById("messages");
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch(SERVER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                const currentLoader = document.getElementById(loaderId);
                if (currentLoader) currentLoader.remove();

                if (data.reply) {
                    addMessage(data.reply, "bot");
                } else {
                    addMessage("Server issue. Please try again.", "bot");
                }

            } catch (err) {
                const currentLoader = document.getElementById(loaderId);
                if (currentLoader) {
                    currentLoader.innerHTML = '<div class="msg-bot text-red-400 text-xs">Error: Could not connect to Rixo server.</div>';
                }
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "flex msg-anim " + (sender === "user" ? "justify-end" : "justify-start");
            div.innerHTML = '<div class="msg-' + sender + '">' + text + '</div>';
            messages.appendChild(div);
            
            setTimeout(() => {
                messages.scrollTop = messages.scrollHeight;
            }, 50);
        }
        
        document.getElementById("userInput").addEventListener("keypress", (e) => { 
            if(e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
