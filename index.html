<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rixo AI</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap)" rel="stylesheet">
    
    <style>
        html, body { 
            background: #050508; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        .app-wrapper {
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            width: 100%;
            background-color: #050508;
        }
        .msg-user {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px; font-size: 0.9rem; max-width: 80%; align-self: flex-end;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.1);
        }
        .msg-bot {
            background: #11141b; border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 16px; font-size: 0.9rem; max-width: 85%; line-height: 1.5;
            position: relative;
        }
        /* Code blocks rendering fix inside chat bubbles */
        .msg-bot pre {
            background: #090b0f;
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .msg-bot code {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .input-bar { background: #0d0f14; border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; width: 100%; }
        .send-btn { background: #06b6d4; color: #000; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; shrink: 0; }
        #messages::-webkit-scrollbar { width: 0; }

        .typing-bubble {
            background: #11141b;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px 16px 16px 4px;
            padding: 14px 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .typing-indicator { display: flex; align-items: center; gap: 5px; height: 10px; }
        .typing-indicator span {
            display: block; width: 5px; height: 5px; background: #94a3b8; border-radius: 50%; opacity: 0.4;
            animation: premium-bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes premium-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-5px); opacity: 1; background: #22d3ee; }
        }
    </style>
</head>
<body class="flex justify-center bg-black">

    <div class="app-wrapper max-w-md sm:border-x border-white/5">
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5 bg-[#050508]/90 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-cyan-500/10 flex items-center justify-center">
                    <i data-lucide="zap" class="w-4 h-4 text-cyan-500"></i>
                </div>
                <h1 class="font-bold text-base tracking-tight text-white">Rixo AI</h1>
            </div>
            <button onclick="clearChat()" class="text-gray-500 hover:text-red-400 p-1.5 rounded-lg transition-colors">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </header>

        <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4">
            <div class="flex justify-start">
                <div class="msg-bot text-white">Hi! I am Rixo. How can I help you?</div>
            </div>
        </div>

        <div class="p-4 bg-[#050508] border-t border-white/5 shrink-0">
            <div id="suggestions" class="flex gap-2 mb-3 overflow-x-auto pb-1">
                <button onclick="useSuggestion('Tell me a completely random, fresh and funny joke')" class="flex items-center gap-1.5 bg-[#11141b] border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-full whitespace-nowrap transition-all">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5 text-cyan-500"></i> Tell a Joke
                </button>
                <button onclick="useSuggestion('Give me a quick programming tip or a short coding challenge')" class="flex items-center gap-1.5 bg-[#11141b] border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-full whitespace-nowrap transition-all">
                    <i data-lucide="code" class="w-3.5 h-3.5 text-cyan-500"></i> Code Help
                </button>
                <button onclick="useSuggestion('What is the most interesting thing about AI?')" class="flex items-center gap-1.5 bg-[#11141b] border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-full whitespace-nowrap transition-all">
                    <i data-lucide="cpu" class="w-3.5 h-3.5 text-cyan-500"></i> AI Insights
                </button>
            </div>

            <div class="input-bar flex items-center px-2 py-1.5">
                <input id="userInput" type="text" 
                    class="flex-1 bg-transparent border-none outline-none text-white px-3 py-2 text-sm" 
                    placeholder="Message Rixo..."
                    autocomplete="off">
                <button onclick="sendMessage()" class="send-btn">
                    <i data-lucide="arrow-up" class="w-5 h-5 stroke-[3px]"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const SERVER_URL = "/chat"; 

        // Safe Custom Markdown Parser to handle code blocks and inline code safely
        function formatAIResponse(text) {
            // Escape HTML tags to prevent broken nodes
            let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // Convert Triple Backticks code blocks (
            clean = clean.replace(/
([\s\S]*?)`/g, function(match, codeBody) {
                return '<pre><code>' + codeBody.trim() + '</code></pre>';
            });
            
            // Convert Single Backticks inline code (`code`)
            clean = clean.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            return clean;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";
            
            document.getElementById("suggestions").style.display = "none";
            const loaderId = "l-" + Date.now();
            const loader = document.createElement("div");
            loader.id = loaderId;
            loader.className = "flex justify-start";
            loader.innerHTML = '<div class="typing-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            document.getElementById("messages").appendChild(loader);
            
            const box = document.getElementById("messages");
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch(SERVER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                const currentLoader = document.getElementById(loaderId);
                if (currentLoader) currentLoader.remove();

                if (data.reply) {
                    addMessage(data.reply, "bot");
                } else {
                    addMessage("Server issue. Please try again.", "bot");
                }

            } catch (err) {
                const currentLoader = document.getElementById(loaderId);
                if (currentLoader) {
                    currentLoader.innerHTML = '<div class="msg-bot text-red-400 text-xs">Error: Connection issue.</div>';
                }
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "flex " + (sender === "user" ? "justify-end" : "justify-start");
            
            if (sender === "bot") {
                // Formatting markdown safely
                let parsedText = formatAIResponse(text);
                div.innerHTML = '<div class="msg-bot text-white flex flex-col gap-1 w-full"><div>' + parsedText + '</div><button onclick="copyToClipboard(this)" class="self-end text-gray-500 hover:text-cyan-400 mt-1 transition-colors"><i data-lucide="copy" class="w-3.5 h-3.5"></i></button></div>';
            } else {
                div.innerHTML = '<div class="msg-user">' + text + '</div>';
            }
            
            messages.appendChild(div);
            lucide.createIcons();
            
            setTimeout(() => {
                messages.scrollTop = messages.scrollHeight;
            }, 50);
        }

        function useSuggestion(phrase) {
            document.getElementById("userInput").value = phrase;
            sendMessage();
        }

        function clearChat() {
            const messages = document.getElementById("messages");
            messages.innerHTML = '<div class="flex justify-start"><div class="msg-bot text-white">Chat cleared! How can I help you now?</div></div>';
            document.getElementById("suggestions").style.display = "flex";
            lucide.createIcons();
        }

        function copyToClipboard(button) {
            // Standardizing text capture to prevent innerHTML artifacts
            const textToCopy = button.parentElement.firstElementChild.innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                button.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5 text-green-400"></i>';
                lucide.createIcons();
                setTimeout(() => {
                    button.innerHTML = '<i data-lucide="copy" class="w-3.5 h-3.5"></i>';
                    lucide.createIcons();
                }, 1500);
            });
        }
        
        document.getElementById("userInput").addEventListener("keypress", (e) => { 
            if(e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
