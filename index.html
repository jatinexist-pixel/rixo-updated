<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rixo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        html, body { 
            background: #030305; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        /* Premium Tech Grid Background to make it look full */
        .app-bg {
            background-color: #050508;
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
        }
        .app-bg::before {
            content: '';
            position: absolute;
            top: -10%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .app-bg::after {
            content: '';
            position: absolute;
            bottom: -10%; right: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .app-wrapper {
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .msg-user {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border-radius: 18px 18px 4px 18px;
            padding: 10px 14px; font-size: 0.9rem; max-width: 80%; width: fit-content; align-self: flex-end;
            box-shadow: 0 4px 14px rgba(6, 182, 212, 0.15);
            color: #000;
            font-weight: 500;
        }
        .msg-bot {
            background: rgba(17, 20, 27, 0.7); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px 18px 18px 18px;
            padding: 12px 16px; font-size: 0.9rem; max-width: 100%; width: fit-content; line-height: 1.5;
        }
        .msg-bot pre {
            background: #090b0f;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .msg-bot code {
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .input-bar { 
            background: rgba(13, 15, 20, 0.8); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.15); 
            border-radius: 24px; 
            width: 100%; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .send-btn { background: #06b6d4; color: #000; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; shrink: 0; box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); }
        
        .scroll-hide::-webkit-scrollbar { display: none; width: 0; height: 0; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #messages::-webkit-scrollbar { width: 0; }

        .typing-bubble {
            background: rgba(17, 20, 27, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 4px 16px 16px 16px;
            padding: 14px 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .typing-indicator { display: flex; align-items: center; gap: 5px; height: 10px; }
        .typing-indicator span {
            display: block; width: 5px; height: 5px; background: #94a3b8; border-radius: 50%; opacity: 0.4;
            animation: premium-bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes premium-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-5px); opacity: 1; background: #22d3ee; }
        }
    </style>
</head>
<body class="flex justify-center bg-black">

    <div class="app-wrapper app-bg max-w-md sm:border-x border-white/5">
        
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5 bg-[#050508]/90 backdrop-blur-md shrink-0">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-cyan-500/10 flex items-center justify-center border border-cyan-500/20">
                    <svg class="w-4 h-4 text-cyan-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                </div>
                <div>
                    <h1 class="font-bold text-sm tracking-tight text-white leading-none">Rixo Core AI</h1>
                    <span class="text-[10px] text-cyan-400/70 font-mono tracking-widest uppercase">v3.2.1 // live</span>
                </div>
            </div>
            <button onclick="clearChat()" class="text-gray-500 hover:text-red-400 p-1.5 rounded-lg transition-colors bg-white/5 border border-white/5">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
            </button>
        </header>

        <div class="px-6 py-1.5 border-b border-white/5 bg-[#09090f]/60 backdrop-blur-sm flex justify-between items-center text-[10px] font-mono text-gray-500 shrink-0">
            <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>SYSTEM: READY</span>
            </div>
            <div>MODEL: LLAMA-3-70B</div>
            <div>LATENCY: 14ms</div>
        </div>

        <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-5">
            <div class="flex flex-col gap-1 items-start max-w-[85%]">
                <div class="flex justify-between items-center w-full px-1 text-[11px] text-gray-500 font-mono">
                    <span>🤖 RIXO AI</span>
                </div>
                <div class="msg-bot text-white">Hi! I am Rixo. How can I help you?</div>
            </div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[#050508] via-[#050508]/95 to-transparent shrink-0">
            
            <div id="suggestions" class="flex gap-2 mb-3 overflow-x-auto pb-1 scroll-hide w-full">
                <button onclick="useSuggestion('Tell me a funny joke')" class="flex items-center gap-1.5 bg-[#11141b]/90 border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-full whitespace-nowrap transition-all shrink-0">
                    <svg class="w-3.5 h-3.5 text-cyan-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
                    Tell a Joke
                </button>
                <button onclick="useSuggestion('Give me a short coding tip')" class="flex items-center gap-1.5 bg-[#11141b]/90 border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-full whitespace-nowrap transition-all shrink-0">
                    <svg class="w-3.5 h-3.5 text-cyan-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>
                    Code Help
                </button>
                <button onclick="useSuggestion('What is the most interesting thing about AI?')" class="flex items-center gap-1.5 bg-[#11141b]/90 border border-white/5 hover:border-cyan-500/30 text-xs text-gray-400 hover:text-white px-3 py-1.5 rounded-full whitespace-nowrap transition-all shrink-0">
                    <svg class="w-3.5 h-3.5 text-cyan-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/></svg>
                    AI Insights
                </button>
            </div>

            <div class="input-bar flex items-center px-2 py-1.5">
                <input id="userInput" type="text" 
                    class="flex-1 bg-transparent border-none outline-none text-white px-3 py-2 text-sm placeholder-gray-500" 
                    placeholder="Ask Rixo anything..."
                    autocomplete="off">
                <button onclick="sendMessage()" class="send-btn">
                    <svg class="w-5 h-5 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function formatAIResponse(text) {
            let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            clean = clean.replace(/```([\s\S]*?)```/g, function(match, codeBody) {
                return '<pre><code>' + codeBody.trim() + '</code></pre>';
            });
            clean = clean.replace(/`([^`]+)`/g, '<code>$1</code>');
            return clean;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";
            
            document.getElementById("suggestions").style.display = "none";
            chatHistory.push({ role: "user", content: text });

            // Premium Typing Animation
            const loaderId = "l-" + Date.now();
            const loader = document.createElement("div");
            loader.id = loaderId;
            loader.className = "flex justify-start max-w-[85%]";
            loader.innerHTML = '<div class="typing-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            document.getElementById("messages").appendChild(loader);
            
            const box = document.getElementById("messages");
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ history: chatHistory })
                });

                const data = await response.json();
                const currentLoader = document.getElementById(loaderId);
                if (currentLoader) currentLoader.remove();

                if (data.reply) {
                    addMessage(data.reply, "bot");
                    chatHistory.push({ role: "assistant", content: data.reply });
                } else {
                    addMessage("Server issue. Please try again.", "bot");
                }

            } catch (err) {
                const currentLoader = document.getElementById(loaderId);
                if (currentLoader) {
                    currentLoader.innerHTML = '<div class="msg-bot text-red-400 text-xs">Error: Connection issue.</div>';
                }
            }
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            
            if (sender === "bot") {
                div.className = "flex flex-col gap-1 items-start max-w-[85%]";
                let parsedText = formatAIResponse(text);
                
                // Copy button outer layout (Top side right corner structure)
                div.innerHTML = `
                    <div class="flex justify-between items-center w-full px-1 text-[11px] text-gray-500 font-mono">
                        <span>🤖 RIXO AI</span>
                        <button onclick="copyToClipboard(this)" class="text-gray-500 hover:text-cyan-400 flex items-center gap-1 transition-colors">
                            <span>Copy</span>
                            <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        </button>
                    </div>
                    <div class="msg-bot text-white">${parsedText}</div>
                `;
            } else {
                div.className = "flex w-full justify-end";
                div.innerHTML = `<div class="msg-user">${text}</div>`;
            }
            
            messages.appendChild(div);
            setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 50);
        }

        function useSuggestion(phrase) {
            document.getElementById("userInput").value = phrase;
            sendMessage();
        }

        function clearChat() {
            const messages = document.getElementById("messages");
            messages.innerHTML = `
                <div class="flex flex-col gap-1 items-start max-w-[85%]">
                    <div class="flex justify-between items-center w-full px-1 text-[11px] text-gray-500 font-mono">
                        <span>🤖 RIXO AI</span>
                    </div>
                    <div class="msg-bot text-white">Chat cleared! How can I help you now?</div>
                </div>
            `;
            document.getElementById("suggestions").style.display = "flex";
            chatHistory = [];
        }

        function copyToClipboard(button) {
            // Target the next element sibling which is the .msg-bot text container
            const textToCopy = button.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const textSpan = button.firstElementChild;
                textSpan.innerText = "Copied!";
                button.classList.add("text-green-400");
                
                setTimeout(() => {
                    textSpan.innerText = "Copy";
                    button.classList.remove("text-green-400");
                }, 1500);
            });
        }
        
        document.getElementById("userInput").addEventListener("keypress", (e) => { 
            if(e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
