<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Rixo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        html, body { 
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ----- DARK THEME (DEFAULT) ----- */
        body.dark-mode { background: #000; color: #e2e8f0; }
        body.dark-mode .app-container { background-color: #050508; background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 16px 16px; }
        body.dark-mode .header-el { background: rgba(5, 5, 8, 0.9); border-color: rgba(255, 255, 255, 0.05); }
        body.dark-mode .msg-bot { background: #11141b; border-color: rgba(255, 255, 255, 0.08); color: #ffffff; }
        body.dark-mode .msg-user { background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%); color: #ffffff; box-shadow: 0 4px 12px rgba(6, 182, 212, 0.1); }
        body.dark-mode .input-container { background: rgba(5, 5, 8, 0.95); border-color: rgba(255, 255, 255, 0.02); }
        body.dark-mode .input-bar { background: #0d0f14; border-color: rgba(255, 255, 255, 0.1); color: #ffffff; }
        body.dark-mode .pill-btn { background: #11141b; border-color: rgba(255, 255, 255, 0.05); color: #94a3b8; }
        body.dark-mode .popover-menu { background: #0d1017; border-color: rgba(255, 255, 255, 0.08); color: #e2e8f0; }
        body.dark-mode .clear-btn:hover { color: #f87171; background: rgba(248, 113, 113, 0.05); }

        /* ----- ULTRA-PREMIUM NO-COLORS LIGHT THEME ----- */
        body.light-mode { background: #f4f4f6; color: #1a1a1c; }
        body.light-mode .app-container { background-color: #f9f9fb; background-image: radial-gradient(rgba(0, 0, 0, 0.015) 1px, transparent 1px); background-size: 16px 16px; }
        body.light-mode .header-el { background: #f9f9fb; border-color: rgba(0, 0, 0, 0.05); }
        body.light-mode .msg-bot { background: #eaeaea; border-color: rgba(0, 0, 0, 0.02); color: #1a1a1c; }
        body.light-mode .msg-user { background: #1a1a1c; color: #ffffff; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06); }
        body.light-mode .input-container { background: #f9f9fb; border-color: rgba(0, 0, 0, 0.02); }
        body.light-mode .input-bar { background: #eaeaea; border-color: rgba(0, 0, 0, 0.04); color: #1a1a1c; }
        body.light-mode .pill-btn { background: #eaeaea; border-color: rgba(0, 0, 0, 0.03); color: #2e2e31; }
        body.light-mode .popover-menu { background: #1a1a1c; border-color: rgba(0, 0, 0, 0.1); color: #ffffff; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        body.light-mode .clear-btn:hover { color: #9c8070; background: rgba(156, 128, 112, 0.06); }
        body.light-mode .text-white { color: #1a1a1c; }
        body.light-mode h1 { color: #1a1a1c; }
        body.light-mode .popover-menu button { color: #ffffff !important; }
        body.light-mode .popover-menu button:hover { background: rgba(255, 255, 255, 0.08); }

        /* Common Core Structural Elements */
        .app-wrapper { height: 100vh; height: -webkit-fill-available; display: flex; flex-direction: column; width: 100%; }
        .msg-user { border-radius: 18px 18px 4px 18px; padding: 10px 14px; font-size: 0.9rem; max-width: 80%; align-self: flex-end; font-weight: 500; }
        .msg-bot { border-radius: 18px 18px 18px 4px; padding: 12px 16px; font-size: 0.9rem; max-width: 85%; line-height: 1.6; position: relative; white-space: pre-wrap; word-break: break-word; animation: premiumFade 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .msg-bot code { font-family: 'JetBrains Mono', monospace; background: rgba(0, 0, 0, 0.04); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; color: #1a1a1c; }
        body.dark-mode .msg-bot code { background: rgba(0, 0, 0, 0.4); color: #22d3ee; }

        @keyframes premiumFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .loader-dot { animation: dotPulse 1.2s infinite ease-in-out both; }
        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        .input-bar { border-width: 1px; border-radius: 28px; }
        .send-btn { background: #06b6d4; color: #000; border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; shrink: 0; transition: all 0.2s; }
        body.light-mode .send-btn { background: #1a1a1c; color: #fff; }
        
        #messages::-webkit-scrollbar { display: none; width: 0; height: 0; }
        #messages { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="dark-mode flex justify-center items-center">

    <div class="app-wrapper max-w-md border-x border-white/5 relative app-container transition-all">
        
        <header class="h-14 flex items-center justify-between px-4 border-b header-el backdrop-blur-md shrink-0 z-20 relative">
            <div class="flex items-center gap-2">
                <button id="backToMainBtn" onclick="routeToSession('main')" class="hidden p-1.5 mr-1 rounded-lg bg-gray-500/10 text-gray-400 hover:text-black flex items-center justify-center transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </button>
                <div id="dynamicIconContainer" class="w-7 h-7 rounded-lg bg-cyan-500/10 flex items-center justify-center">
                    <i data-lucide="zap" class="w-4 h-4 text-cyan-500"></i>
                </div>
                <div class="flex flex-col">
                    <h1 class="font-bold text-sm tracking-tight text-white transition-all" id="headerTitle">Rixo AI</h1>
                </div>
            </div>
            
            <div class="flex items-center gap-1.5">
                <button onclick="triggerClearCurrentSession()" class="p-2 text-gray-400 clear-btn rounded-lg transition-all flex items-center justify-center" title="Clear Chat">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
                <button onclick="toggleThreeDotsMenu(event)" class="p-2 text-gray-400 hover:text-white rounded-lg flex items-center justify-center transition-colors">
                    <i data-lucide="more-vertical" class="w-4 h-4"></i>
                </button>
            </div>

            <div id="threeDotsMenu" class="hidden absolute right-4 top-13 w-40 border rounded-xl p-1.5 z-30 flex flex-col gap-0.5 popover-menu transition-all">
                <button onclick="switchTheme('light')" class="flex items-center gap-2 w-full px-2.5 py-2 text-xs font-semibold rounded-lg transition-all text-left">
                    <i data-lucide="sun" class="w-3.5 h-3.5 text-neutral-400"></i> Light Mode
                </button>
                <button onclick="switchTheme('dark')" class="flex items-center gap-2 w-full px-2.5 py-2 text-xs font-semibold rounded-lg transition-all text-left">
                    <i data-lucide="moon" class="w-3.5 h-3.5 text-cyan-400"></i> Absolute Dark
                </button>
            </div>
        </header>

        <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4">
            </div>

        <div class="p-4 backdrop-blur-md border-t input-container shrink-0">
            <div class="input-bar flex items-center px-2 py-1.5">
                <input id="userInput" type="text" 
                    class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-sm placeholder-gray-500" 
                    placeholder="Message Rixo...">
                <button onclick="handleUserMessageTransmission()" class="send-btn">
                    <i data-lucide="arrow-up" class="w-5 h-5 stroke-[3px]"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        let activeRoomRoute = "main"; 
        
        let sessionStore = {
            main: { historyArray: [], welcomeActive: true },
            joke: { historyArray: [], welcomeActive: false, initialPrompt: "Tell me an extremely funny modern joke. Use highly expressive funny emojis like 😂 or 🤣 inside the response text to emphasize the humor.", headerIcon: "smile" },
            code: { historyArray: [], welcomeActive: false, initialPrompt: "Ask me what language or project I need help coding right now. Do not generate code yet.", headerIcon: "code-2" },
            insights: { historyArray: [], welcomeActive: false, initialPrompt: "Share some interesting insights about AI scaling models without using any emojis.", headerIcon: "brain" }
        };

        const SERVER_URL = "/chat";

        window.addEventListener("DOMContentLoaded", () => {
            loadAllStateFromStorage();
            renderActiveRoomStage();
            switchTheme(localStorage.getItem("rixo_style_theme") || "dark");
        });

        function switchTheme(themeMode) {
            if(themeMode === "light") {
                document.body.classList.remove("dark-mode");
                document.body.classList.add("light-mode");
            } else {
                document.body.classList.remove("light-mode");
                document.body.classList.add("dark-mode");
            }
            localStorage.setItem("rixo_style_theme", themeMode);
            document.getElementById("threeDotsMenu").classList.add("hidden");
        }

        function toggleThreeDotsMenu(e) {
            e.stopPropagation();
            document.getElementById("threeDotsMenu").classList.toggle("hidden");
        }

        window.addEventListener("click", () => {
            document.getElementById("threeDotsMenu").classList.add("hidden");
        });

        function routeToSession(targetRoom) {
            activeRoomRoute = targetRoom;
            renderActiveRoomStage();
            
            if(targetRoom !== 'main' && sessionStore[targetRoom].historyArray.length === 0) {
                executeEngineBackendOperation(sessionStore[targetRoom].initialPrompt);
            }
        }

        function renderActiveRoomStage() {
            const container = document.getElementById("messages");
            container.innerHTML = ""; 
            
            const backBtn = document.getElementById("backToMainBtn");
            const mainTitle = document.getElementById("headerTitle");
            const iconContainer = document.getElementById("dynamicIconContainer");

            if(activeRoomRoute === "main") {
                backBtn.classList.add("hidden");
                mainTitle.innerText = "Rixo AI";
                iconContainer.innerHTML = `<i data-lucide="zap" class="w-4 h-4 text-cyan-500"></i>`;

                if(sessionStore.main.welcomeActive) {
                    container.innerHTML = `
                        <div class="flex flex-col gap-3 items-start w-full" id="welcomeStack">
                            <div class="flex justify-start w-full">
                                <div class="msg-bot">Hi! I am Rixo. How can I help you today?</div>
                            </div>
                            <div id="suggestions" class="flex gap-2 overflow-x-auto w-full pb-1 mt-1 scroll-hide">
                                <button onclick="routeToSession('joke')" class="pill-btn flex items-center gap-1.5 border text-xs px-3.5 py-1.5 rounded-full whitespace-nowrap transition-all">
                                    <i data-lucide="smile" class="w-3.5 h-3.5 text-cyan-500"></i>
                                    <span>Tell a Joke</span>
                                </button>
                                <button onclick="routeToSession('code')" class="pill-btn flex items-center gap-1.5 border text-xs px-3.5 py-1.5 rounded-full whitespace-nowrap transition-all">
                                    <i data-lucide="code-2" class="w-3.5 h-3.5 text-cyan-500"></i>
                                    <span>Code Help</span>
                                </button>
                                <button onclick="routeToSession('insights')" class="pill-btn flex items-center gap-1.5 border text-xs px-3.5 py-1.5 rounded-full whitespace-nowrap transition-all">
                                    <i data-lucide="brain" class="w-3.5 h-3.5 text-cyan-500"></i>
                                    <span>AI Insights</span>
                                </button>
                            </div>
                        </div>`;
                }
            } else {
                backBtn.classList.remove("hidden");
                mainTitle.innerText = activeRoomRoute === 'joke' ? 'Jokes Station' : activeRoomRoute === 'code' ? 'Code Matrix' : 'AI Lab';
                
                const currentIcon = sessionStore[activeRoomRoute].headerIcon;
                iconContainer.innerHTML = `<i data-lucide="${currentIcon}" class="w-4 h-4 text-cyan-500"></i>`;
            }

            sessionStore[activeRoomRoute].historyArray.forEach(msg => {
                appendUIMessageNode(msg.content, msg.role === 'user' ? 'user' : 'bot');
            });

            lucide.createIcons();
            scrollChatToBottom();
        }

        async function executeEngineBackendOperation(userInputPromptText) {
            const loaderId = "l-" + Date.now();
            const loader = document.createElement("div");
            loader.id = loaderId;
            loader.className = "flex justify-start mb-2";
            loader.innerHTML = `
                <div class="msg-bot flex items-center gap-1.5 px-4 py-3">
                    <span class="w-2 h-2 rounded-full bg-cyan-500 loader-dot"></span>
                    <span class="w-2 h-2 rounded-full bg-cyan-500 loader-dot"></span>
                    <span class="w-2 h-2 rounded-full bg-cyan-500 loader-dot"></span>
                </div>`;
            document.getElementById("messages").appendChild(loader);
            scrollChatToBottom();

            try {
                const response = await fetch(SERVER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: userInputPromptText,
                        history: sessionStore[activeRoomRoute].historyArray 
                    })
                });

                const data = await response.json();
                document.getElementById(loaderId).remove();

                if (data.reply) {
                    appendUIMessageNode(data.reply, "bot");
                    sessionStore[activeRoomRoute].historyArray.push({ role: "assistant", content: data.reply });
                    saveAllStateToStorage(); 
                } else {
                    appendUIMessageNode("Server issue. Please try again.", "bot");
                }
            } catch (err) {
                document.getElementById(loaderId).innerHTML = `<div class="msg-bot text-red-400 text-xs">Error: Connection failed.</div>`;
            }
        }

        async function handleUserMessageTransmission() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            if (activeRoomRoute === 'main' && sessionStore.main.welcomeActive) {
                sessionStore.main.welcomeActive = false;
                const element = document.getElementById("suggestions");
                if (element) element.style.display = "none";
            }

            // Append specific logic constraints to character personality rules based on active route session settings
            let customizedRoutePrompt = text;
            if (activeRoomRoute === 'joke') {
                customizedRoutePrompt += " (Act as a pure funny comedian persona and use expressive funny emojis like 😂, 🤣 or 💀 in the text body response)";
            } else if (activeRoomRoute === 'code' || activeRoomRoute === 'insights') {
                customizedRoutePrompt += " (Strictly do not use any emojis in this technical response layout)";
            }

            appendUIMessageNode(text, "user");
            sessionStore[activeRoomRoute].historyArray.push({ role: "user", content: text });
            saveAllStateToStorage(); 
            input.value = "";

            await executeEngineBackendOperation(customizedRoutePrompt);
        }

        function appendUIMessageNode(text, sender) {
            const messages = document.getElementById("messages");
            const div = document.createElement("div");
            div.className = "flex w-full " + (sender === "user" ? "justify-end" : "justify-start");
            
            if (sender === "bot") {
                let processedText = text.replace(/`([^`]+)`/g, '<code>$1</code>');
                div.innerHTML = `<div class="msg-bot">${processedText}</div>`;
            } else {
                div.innerHTML = `<div class="msg-user">${text}</div>`;
            }
            
            messages.appendChild(div);
            scrollChatToBottom();
        }

        function triggerClearCurrentSession() {
            sessionStore[activeRoomRoute].historyArray = [];
            if(activeRoomRoute === 'main') {
                sessionStore.main.welcomeActive = true;
            }
            renderActiveRoomStage();
            saveAllStateToStorage();
        }

        function saveAllStateToStorage() {
            localStorage.setItem("rixo_multiverse_store", JSON.stringify(sessionStore));
        }

        function loadAllStateFromStorage() {
            const savedStateData = localStorage.getItem("rixo_multiverse_store");
            if(savedStateData) {
                sessionStore = JSON.parse(savedStateData);
            }
        }

        function scrollChatToBottom() {
            const messages = document.getElementById("messages");
            setTimeout(() => { messages.scrollTop = messages.scrollHeight; }, 30);
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === "Enter") handleUserMessageTransmission(); });
    </script>
</body>
</html>
