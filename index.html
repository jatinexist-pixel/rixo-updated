<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rixo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { background: #050508; color: #e2e8f0; height: 100%; margin: 0; overflow: hidden; }
        .app-wrapper { height: 100vh; display: flex; flex-direction: column; width: 100%; max-width: 440px; margin: 0 auto; }
        .msg-user { background: #06b6d4; color: #000; border-radius: 18px 18px 4px 18px; padding: 10px 14px; font-size: 0.9rem; max-width: 80%; width: fit-content; align-self: flex-end; }
        .msg-bot { background: #11141b; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px 18px 18px 4px; padding: 12px 16px; font-size: 0.9rem; max-width: 85%; width: fit-content; align-self: flex-start; }
        .msg-bot pre { background: #090b0f; padding: 10px; border-radius: 8px; overflow-x: auto; font-family: monospace; font-size: 0.85rem; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-bot code { font-family: monospace; background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body class="flex justify-center bg-black">

    <div class="app-wrapper sm:border-x border-white/5">
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5 bg-[#050508]">
            <h1 class="font-bold text-white text-base">Rixo AI</h1>
            <button onclick="clearChat()" class="text-gray-500 hover:text-red-400 text-xs">Clear</button>
        </header>

        <div id="messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4">
            <div class="msg-bot text-white">Hi! I am Rixo. How can I help you?</div>
        </div>

        <div class="p-4 bg-[#050508] border-t border-white/5">
            <div class="flex items-center bg-[#0d0f14] border border-white/10 rounded-full px-3 py-1.5">
                <input id="userInput" type="text" class="flex-1 bg-transparent outline-none text-white px-2 py-1 text-sm" placeholder="Message Rixo..." autocomplete="off">
                <button onclick="sendMessage()" class="bg-cyan-500 text-black rounded-full p-2 text-xs font-bold">Send</button>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function formatResponse(text) {
            let clean = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            clean = clean.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            clean = clean.replace(/`([^`]+)`/g, '<code>$1</code>');
            return clean;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            // User Message HTML
            const messagesContainer = document.getElementById("messages");
            const userDiv = document.createElement("div");
            userDiv.className = "flex flex-col";
            userDiv.innerHTML = '<div class="msg-user">' + text + '</div>';
            messagesContainer.appendChild(userDiv);
            
            input.value = "";
            chatHistory.push({ role: "user", content: text });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ history: chatHistory })
                });

                const data = await response.json();
                
                if (data.reply) {
                    const botDiv = document.createElement("div");
                    botDiv.className = "flex flex-col";
                    botDiv.innerHTML = '<div class="msg-bot">' + formatResponse(data.reply) + '</div>';
                    messagesContainer.appendChild(botDiv);
                    
                    chatHistory.push({ role: "assistant", content: data.reply });
                }
            } catch (err) {
                console.error(err);
            }
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function clearChat() {
            document.getElementById("messages").innerHTML = '<div class="msg-bot">Chat cleared!</div>';
            chatHistory = [];
        }

        document.getElementById("userInput").addEventListener("keypress", (e) => { 
            if(e.key === "Enter") sendMessage(); 
        });
    </script>
</body>
</html>
